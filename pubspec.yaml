name: hanzi_practice_engine
description: Core data parsing and CustomPainter engine for Chinese stroke-order practice sheets.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.3.0
  path_drawing: ^1.0.1
  vector_math: ^2.1.4
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_graphics.json
    - assets/hanzi_dictionary.json
